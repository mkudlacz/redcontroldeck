<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#7d2020"/>

  <!-- Tick marks -->
  <g stroke="white" stroke-width="1.5" stroke-linecap="round">
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(0,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(30,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(60,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(90,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(120,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(150,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(180,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(210,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(240,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(270,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(300,32,32)"/>
    <line x1="32" y1="3" x2="32" y2="8" transform="rotate(330,32,32)"/>
  </g>

  <!-- Knob border ring -->
  <circle cx="32" cy="32" r="25" fill="white"/>

  <!-- Knob face -->
  <circle cx="32" cy="32" r="23" fill="white"/>

  <!-- Indicator arm -->
  <line x1="32" y1="32" x2="32" y2="13"
        stroke="#7d2020" stroke-width="2" stroke-linecap="round"
        transform="rotate(75,32,32)"/>

  <!-- Axel -->
  <circle cx="32" cy="32" r="2.5" fill="#7d2020"/>
</svg>
