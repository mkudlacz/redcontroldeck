<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c"><rect width="64" height="64" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Background -->
    <rect width="64" height="64" fill="#7d2020"/>

    <!-- Gear teeth (12, white rectangles extending outward from knob edge) -->
    <g fill="white">
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(0,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(30,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(60,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(90,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(120,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(150,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(180,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(210,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(240,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(270,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(300,32,32)"/>
      <rect x="29.5" y="2" width="5" height="6" transform="rotate(330,32,32)"/>
    </g>

    <!-- Knob face -->
    <circle cx="32" cy="32" r="24" fill="white"/>

    <!-- Indicator arm at 2:30 (75° from 12) -->
    <line x1="32" y1="22" x2="32" y2="11.7"
          stroke="#7d2020" stroke-width="2.5" stroke-linecap="round"
          transform="rotate(45,32,32)"/>
  </g>
</svg>
